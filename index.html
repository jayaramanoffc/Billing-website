<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing - Restaurant</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/billing.js"></script>
  <script src="js/manage.js"></script> 
  <script src="js/menu-data.js"></script>
  <script src="js/report.js"></script>
  <script src="js/storage.js"></script>
</head>
<body>
  <header class="no-print">
    <h1>Restaurant Billing</h1>
    <nav>
      <a href="index.html">Billing</a>
      <a href="manage.html">Manage Menu</a>
      <a href="report.html">Sales Report</a>
    </nav>
  </header>

  <main class="container">
    <div class="hero no-print">
      <h2>Today's Menu</h2>
      <p>Tap an item to add to your bill</p>
    </div>
    <div class="billing-layout">
      <section class="no-print">
        <div class="menu-grid" id="menuGrid"></div>
      </section>

      <aside class="cart-panel">
        <h2>Cart / Bill</h2>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total" id="cartTotal" style="display: none;">Total: Rs. <span id="totalAmount">0</span></div>
        <div class="cart-actions no-print">
          <button type="button" class="btn-pay" id="btnPay" disabled>Pay now</button>
          <button type="button" class="btn-print" id="btnPrint">Print bill</button>
          <button type="button" class="btn-clear" id="btnClear">Clear cart</button>
        </div>
        <div class="print-only" id="printReceipt"></div>
      </aside>
    </div>
  </main>

  <div class="modal-overlay no-print" id="addConfirmModal" style="display: none;" aria-hidden="true">
    <div class="modal confirm-modal">
      <h3 id="confirmTitle">Add to cart?</h3>
      <div class="confirm-body">
        <img id="confirmImg" alt="" />
        <div class="confirm-meta">
          <div class="confirm-name" id="confirmName"></div>
          <div class="confirm-price" id="confirmPrice"></div>
          <div class="confirm-qty">
            <button type="button" class="qty-btn" id="btnQtyMinus" aria-label="Decrease">−</button>
            <span id="confirmQty">1</span>
            <button type="button" class="qty-btn" id="btnQtyPlus" aria-label="Increase">+</button>
          </div>
        </div>
      </div>
      <div class="modal-actions confirm-actions">
        <button type="button" class="btn" id="btnConfirmCancel">Cancel</button>
        <button type="button" class="btn btn-primary" id="btnConfirmAdd">Confirm</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay no-print" id="qrModal" style="display: none;" aria-hidden="true">
    <div class="modal">
      <h3>Pay now</h3>
      <p style="text-align: center; color: var(--text-muted); font-size: 0.95rem;" id="qrMessage">Scan to pay</p>
      <div class="qr-container" id="qrContainer"></div>
      <div class="modal-actions">
        <button type="button" id="btnDone">Done</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay no-print" id="reviewModal" style="display:none;" aria-hidden="true">
    <div class="modal confirm-modal">
      <h3>How was your experience?</h3>
      <p style="text-align:center; color: var(--text-muted); margin-bottom:0.75rem;">Rate the items you ordered.</p>
      <div id="reviewItems" class="review-items"></div>
      <div class="modal-actions confirm-actions">
        <button type="button" class="btn" id="btnReviewSkip">Skip</button>
        <button type="button" class="btn btn-primary" id="btnReviewSubmit">Submit</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/menu-data.js"></script>
  <script src="js/billing.js"></script>
  <script>
    window.onload = function() {
      seedMenuIfEmpty();
      Billing.init();
    };
    </script>
</body>
</html>
